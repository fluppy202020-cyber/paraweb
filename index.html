<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb X</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:#0a0a0f;
  color:white;
}

/* ===== LOGIN ===== */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg,#0a0a0f,#111,#0f2027);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.login-box{
  width:340px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.login-box h2{
  margin-bottom:15px;
  background:linear-gradient(90deg,cyan,purple);
  -webkit-background-clip:text;
  color:transparent;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin-top:10px;
  cursor:pointer;
}

.social{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.social button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

/* ===== APP ===== */
#app{display:none;height:100vh;}

.main{
  display:flex;
  height:100%;
}

/* sidebar */
.sidebar{
  width:200px;
  background:#111;
  padding:10px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  background:#222;
  color:white;
}

/* content */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* tabs */
.tabs{
  display:flex;
  background:#111;
}

.tab{
  padding:10px;
  cursor:pointer;
  border-right:1px solid #222;
}

.tab.active{
  background:cyan;
  color:black;
}

/* bar */
.bar{
  display:flex;
}

.bar input{
  flex:1;
  padding:10px;
  border:none;
}

/* frame */
iframe{
  flex:1;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>ParaWeb</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Continue</button>

    <div class="social">
      <button onclick="social()">Google</button>
      <button onclick="social()">Apple</button>
      <button onclick="social()">FB</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
<div class="main">

<div class="sidebar">
  <h3>ParaWeb</h3>
  <button onclick="newTab()">+ New Tab</button>
  <button onclick="goHome()">Home</button>
  <button onclick="addBookmark()">Bookmark</button>
  <button onclick="showBookmarks()">Bookmarks</button>
  <button onclick="showHistory()">History</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="tabs" id="tabs"></div>

<div class="bar">
  <input id="url" placeholder="Search or URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

</div>
</div>
</div>

<script>
// LOGIN
function login(){
  if(user.value && pass.value){
    localStorage.setItem("logged","yes");
    start();
  } else {
    alert("Enter details");
  }
}

function social(){
  alert("Real social login needs backend");
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

if(localStorage.getItem("logged")=="yes") start();

// TABS
let tabs=[];
let current=0;

function newTab(){
  tabs.push("https://duckduckgo.com");
  current=tabs.length-1;
  renderTabs();
  load();
}

function renderTabs(){
  let t=document.getElementById("tabs");
  t.innerHTML="";
  tabs.forEach((tab,i)=>{
    t.innerHTML+=`<div class="tab ${i==current?'active':''}" onclick="switchTab(${i})">Tab ${i+1}</div>`;
  });
}

function switchTab(i){
  current=i;
  load();
}

function load(){
  document.getElementById("frame").src=tabs[current];
  renderTabs();
}

// SEARCH
function go(){
  let v=url.value;
  let link = v.startsWith("http") ? v : "https://duckduckgo.com/?q="+v;
  tabs[current]=link;
  saveHistory(v);
  load();
}

function goHome(){
  tabs[current]="https://duckduckgo.com";
  load();
}

// BOOKMARKS
let bookmarks=JSON.parse(localStorage.getItem("bookmarks")||"[]");

function addBookmark(){
  bookmarks.push(frame.src);
  localStorage.setItem("bookmarks",JSON.stringify(bookmarks));
  alert("Saved");
}

function showBookmarks(){
  alert(bookmarks.join("\n"));
}

// HISTORY
let historyList=JSON.parse(localStorage.getItem("history")||"[]");

function saveHistory(q){
  historyList.unshift(q);
  localStorage.setItem("history",JSON.stringify(historyList));
}

function showHistory(){
  alert(historyList.join("\n"));
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// ENTER KEY
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(document.getElementById("app").style.display==="none"){
      login();
    } else {
      go();
    }
  }
});

// INIT
newTab();
</script>

</body>
</html>
