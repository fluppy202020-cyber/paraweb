<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  background: #0a0a0f;
  color: white;
}

/* Particle canvas */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Glass UI */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.search-box {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  width: 60%;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,255,255,0.1);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: cyan;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px cyan;
}

h1 {
  margin-bottom: 20px;
  font-size: 40px;
  background: linear-gradient(90deg, cyan, purple);
  -webkit-background-clip: text;
  color: transparent;
}

/* floating blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: move 10s infinite alternate;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(100px, -100px); }
}

.blob1 { width: 200px; height: 200px; background: cyan; top: 10%; left: 10%; }
.blob2 { width: 300px; height: 300px; background: purple; bottom: 10%; right: 10%; }

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  <div class="search-box">
    <h1>ParaWeb</h1>
    <input id="search" placeholder="Search anything...">
    <br>
    <button onclick="search()">Search</button>
  </div>
</div>

<script>
// Simple search redirect (like Google)
function search() {
  let query = document.getElementById("search").value;
  window.location.href = "https://www.google.com/search?q=" + query;
}

// Particle system
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() - 0.5,
    vy: Math.random() - 0.5,
    size: Math.random() * 2
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = "cyan";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
  </html>
