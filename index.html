<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb X</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0f;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* APP */
#app{display:none; height:100vh;}

/* LAYOUT */
.main{
  display:flex;
  height:100%;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#111;
  padding:10px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
}

/* CONTENT */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TABS */
.tabs{
  display:flex;
  background:#111;
}

.tab{
  padding:10px;
  cursor:pointer;
  border-right:1px solid #222;
}

.tab.active{
  background:cyan;
  color:black;
}

/* BAR */
.bar{
  display:flex;
}

.bar input{
  flex:1;
  padding:10px;
}

/* FRAME */
iframe{
  flex:1;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>ParaWeb Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h3>ParaWeb</h3>
      <button onclick="newTab()">+ New Tab</button>
      <button onclick="goHome()">🏠 Home</button>
      <button onclick="showBookmarks()">⭐ Bookmarks</button>
      <button onclick="showHistory()">🕘 History</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- TABS -->
      <div class="tabs" id="tabs"></div>

      <!-- SEARCH BAR -->
      <div class="bar">
        <input id="url" placeholder="Search or enter URL">
        <button onclick="go()">Go</button>
      </div>

      <!-- FRAME -->
      <iframe id="frame"></iframe>

    </div>

  </div>
</div>

<script>
// LOGIN
function login(){
  if(user.value && pass.value){
    localStorage.setItem("logged","yes");
    start();
  }
}

function start(){
  login.style.display="none";
  app.style.display="block";
}

if(localStorage.getItem("logged")=="yes") start();

// TABS
let tabs=[];
let current=0;

function newTab(){
  tabs.push("https://duckduckgo.com");
  current = tabs.length-1;
  renderTabs();
  load();
}

function renderTabs(){
  let t=document.getElementById("tabs");
  t.innerHTML="";

  tabs.forEach((tab,i)=>{
    t.innerHTML += `<div class="tab ${i==current?'active':''}" onclick="switchTab(${i})">
    Tab ${i+1}
    <span onclick="closeTab(${i})">❌</span>
    </div>`;
  });
}

function switchTab(i){
  current=i;
  load();
}

function closeTab(i){
  tabs.splice(i,1);
  current=0;
  renderTabs();
  load();
}

// LOAD PAGE
function load(){
  if(!tabs[current]) return;
  frame.src = tabs[current];
  renderTabs();
}

// GO / SEARCH
function go(){
  let v=url.value;
  let final = v.startsWith("http") ? v : "https://duckduckgo.com/?q="+v;

  tabs[current]=final;
  saveHistory(v);
  load();
}

// HOME
function goHome(){
  tabs[current]="https://duckduckgo.com";
  load();
}

// BOOKMARKS
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")||"[]");

function showBookmarks(){
  alert(bookmarks.join("\n"));
}

// HISTORY
let historyList = JSON.parse(localStorage.getItem("history")||"[]");

function saveHistory(q){
  historyList.unshift(q);
  localStorage.setItem("history",JSON.stringify(historyList));
}

function showHistory(){
  alert(historyList.join("\n"));
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// INIT
newTab();

// ENTER KEY
url.addEventListener("keydown",e=>{
  if(e.key==="Enter") go();
});
</script>

</body>
</html>
