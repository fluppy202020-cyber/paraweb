<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb X</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

/* ===== BACKGROUND ===== */
body{
  background:#0a0a0f;
  color:white;
  overflow:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== LOGIN (LIQUID GLASS) ===== */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:340px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 80px rgba(0,255,255,0.2);
  text-align:center;
  animation:fade .6s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

.login-box h2{
  margin-bottom:20px;
  background:linear-gradient(90deg,cyan,purple);
  -webkit-background-clip:text;
  color:transparent;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.3s;
}

.login-box button:hover{
  transform:scale(1.05);
}

.google{background:white;color:black;}
.guest{background:cyan;}

/* ===== APP ===== */
#app{display:none;height:100vh;}

/* top bar */
.topbar{
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.topbar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* tabs */
.tabs{
  display:flex;
  gap:5px;
  padding:5px;
  background:#111;
  overflow-x:auto;
}

.tab{
  padding:8px 15px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.tab.active{
  background:cyan;
  color:black;
}

.tab:hover{
  transform:translateY(-2px);
}

/* iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>ParaWeb</h2>
    <button class="google" onclick="googleLogin()">Continue with Google</button>
    <button class="guest" onclick="guestLogin()">Continue as Guest</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="tabs" id="tabs"></div>

  <div class="topbar">
    <input id="url" placeholder="Search or URL">
    <button onclick="go()">Go</button>
    <button onclick="newTab()">+</button>
    <button onclick="logout()">Logout</button>
  </div>

  <iframe id="frame"></iframe>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function guestLogin(){
  startApp();
}

auth.onAuthStateChanged(user=>{
  if(user) startApp();
});

function startApp(){
  login.style.display="none";
  app.style.display="block";
}

// LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// TABS
let tabs=[];
let current=0;

function newTab(){
  tabs.push("https://duckduckgo.com");
  current=tabs.length-1;
  renderTabs();
  load();
}

function renderTabs(){
  tabsDiv.innerHTML="";
  tabs.forEach((t,i)=>{
    tabsDiv.innerHTML+=`<div class="tab ${i==current?'active':''}" onclick="switchTab(${i})">Tab ${i+1}</div>`;
  });
}

function switchTab(i){
  current=i;
  load();
}

function load(){
  frame.src=tabs[current];
  renderTabs();
}

// SEARCH
function go(){
  let v=url.value.trim();
  let link = v.startsWith("http") ? v : "https://duckduckgo.com/?q="+v;
  tabs[current]=link;
  load();
}

// ENTER KEY
url.addEventListener("keydown",e=>{
  if(e.key==="Enter") go();
});

// INIT
const tabsDiv=document.getElementById("tabs");
const frame=document.getElementById("frame");
newTab();

// PARTICLES
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;
    ctx.beginPath();
    ctx.arc(a.x,a.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
