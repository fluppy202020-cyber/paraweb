<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  background:#05070d;
  color:white;
  overflow:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== LOGIN ===== */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:340px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 80px rgba(0,255,255,0.2);
  text-align:center;
  animation:fade .6s ease;
}

.login-box h2{
  margin-bottom:20px;
  font-size:28px;
  background:linear-gradient(90deg,cyan,purple);
  -webkit-background-clip:text;
  color:transparent;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.3s;
}

.login-box button:hover{
  transform:scale(1.05);
}

.google{background:white;color:black}
.guest{background:cyan}

/* ===== HOME ===== */
#home{
  display:none;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.logo{
  font-size:50px;
  font-weight:600;
  background:linear-gradient(90deg,cyan,purple);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:20px;
}

/* search */
.search-box{
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:10px;
  display:flex;
  box-shadow:0 0 30px rgba(0,255,255,0.1);
}

.search-box input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:none;
  color:white;
}

.search-box button{
  background:cyan;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* tabs */
.tabs{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  gap:5px;
  padding:5px;
  background:rgba(0,0,0,0.6);
}

.tab{
  padding:8px 12px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.tab.active{
  background:cyan;
  color:black;
}

iframe{
  position:fixed;
  top:40px;
  width:100%;
  height:calc(100% - 40px);
  border:none;
  display:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>ParaWeb</h2>
    <button class="google" onclick="googleLogin()">Continue with Google</button>
    <button class="guest" onclick="guestLogin()">Continue as Guest</button>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="logo">ParaWeb</div>

  <div class="search-box">
    <input id="search" placeholder="Search the web...">
    <button onclick="search()">Go</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<iframe id="frame"></iframe>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyBUeBIYMaNYbRCPe3caXvDsp9Bjo0B8RJ4",
  authDomain: "fluppy202020-cyber.github.io",
  projectId: "parawebsitr",
  appId: "1:1014721445490:web:559f9c85dac83ef7190ceb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function guestLogin(){
  start();
}

auth.onAuthStateChanged(user=>{
  if(user) start();
});

function start(){
  login.style.display="none";
  home.style.display="flex";
}

// SEARCH + TABS
let tabs=[];
let current=0;

function search(){
  let q = searchInput.value.trim();
  if(!q) return;

  let url = "";

  // smart search detection
  if(q.startsWith("yt ")){
    url = "https://www.youtube.com/results?search_query=" + q.replace("yt ","");
  }
  else if(q.startsWith("img ")){
    url = "https://duckduckgo.com/?iax=images&ia=images&q=" + q.replace("img ","");
  }
  else if(q.startsWith("git ")){
    url = "https://github.com/search?q=" + q.replace("git ","");
  }
  else{
    url = "https://duckduckgo.com/?q=" + q;
  }

  tabs.push(url);
  current = tabs.length-1;
  renderTabs();
  load();
  }

function renderTabs(){
  tabsDiv.innerHTML="";
  tabs.forEach((t,i)=>{
    tabsDiv.innerHTML+=`<div class="tab ${i==current?'active':''}" onclick="switchTab(${i})">Tab ${i+1}</div>`;
  });
}

function switchTab(i){
  current=i;
  load();
}

function load(){
  frame.src=tabs[current];
  frame.style.display="block";
  home.style.display="none";
  renderTabs();
}

// ENTER
const searchInput=document.getElementById("search");
searchInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") search();
});

// INIT
const tabsDiv=document.getElementById("tabs");
const frame=document.getElementById("frame");

// PARTICLES
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<70;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;
    ctx.beginPath();
    ctx.arc(a.x,a.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
