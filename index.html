<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaWeb Ultimate</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0f;
  color:white;
}

/* LOGIN UI */
.login-container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a0a0f,#111);
}

.login-box{
  width:320px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  text-align:center;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

.login-btn{
  width:100%;
  padding:12px;
  background:cyan;
  border:none;
  border-radius:10px;
}

.social{
  display:flex;
  gap:5px;
}

.social button{
  flex:1;
  padding:10px;
  background:#222;
  color:white;
  border:none;
  border-radius:10px;
}

/* APP */
#app{display:none;height:100vh;}

.main{display:flex;height:100%;}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#111;
  padding:10px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
}

/* CONTENT */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TABS */
.tabs{
  display:flex;
  background:#111;
}

.tab{
  padding:10px;
  cursor:pointer;
}

.tab.active{
  background:cyan;
  color:black;
}

/* BAR */
.bar{
  display:flex;
}

.bar input{
  flex:1;
  padding:10px;
}

/* FRAME */
iframe{
  flex:1;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
  <div class="login-box">
    <h2>ParaWeb</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <p>or</p>

    <div class="social">
      <button onclick="social('Google')">Google</button>
      <button onclick="social('Apple')">Apple</button>
      <button onclick="social('Facebook')">Facebook</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>ParaWeb</h3>
  <button onclick="newTab()">+ New Tab</button>
  <button onclick="goHome()">Home</button>
  <button onclick="addBookmark()">Bookmark</button>
  <button onclick="showBookmarks()">Bookmarks</button>
  <button onclick="showHistory()">History</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- CONTENT -->
<div class="content">

<div class="tabs" id="tabs"></div>

<div class="bar">
  <input id="url" placeholder="Search or URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

</div>
</div>
</div>

<script>
// LOGIN
function login(){
  if(user.value && pass.value){
    localStorage.setItem("logged","yes");
    start();
  }
}

function social(type){
  alert(type+" login needs backend");
}

function start(){
  login.style.display="none";
  app.style.display="block";
}

if(localStorage.getItem("logged")=="yes") start();

// TABS
let tabs=[];
let current=0;

function newTab(){
  tabs.push("https://duckduckgo.com");
  current=tabs.length-1;
  renderTabs();
  load();
}

function renderTabs(){
  tabsDiv.innerHTML="";
  tabs.forEach((t,i)=>{
    tabsDiv.innerHTML+=`<div class="tab ${i==current?'active':''}" onclick="switchTab(${i})">
    Tab ${i+1}
    </div>`;
  });
}

function switchTab(i){
  current=i;
  load();
}

function load(){
  frame.src=tabs[current];
  renderTabs();
}

// SEARCH
function go(){
  let v=url.value;
  let link=v.startsWith("http")?v:"https://duckduckgo.com/?q="+v;
  tabs[current]=link;
  saveHistory(v);
  load();
}

// HOME
function goHome(){
  tabs[current]="https://duckduckgo.com";
  load();
}

// BOOKMARKS
let bookmarks=JSON.parse(localStorage.getItem("bookmarks")||"[]");

function addBookmark(){
  bookmarks.push(frame.src);
  localStorage.setItem("bookmarks",JSON.stringify(bookmarks));
  alert("Saved");
}

function showBookmarks(){
  alert(bookmarks.join("\n"));
}

// HISTORY
let historyList=JSON.parse(localStorage.getItem("history")||"[]");

function saveHistory(q){
  historyList.unshift(q);
  localStorage.setItem("history",JSON.stringify(historyList));
}

function showHistory(){
  alert(historyList.join("\n"));
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// ENTER KEY
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(app.style.display==="none"){
      login();
    } else {
      go();
    }
  }
});

// INIT
const tabsDiv=document.getElementById("tabs");
const frame=document.getElementById("frame");
newTab();
</script>

</body>
</html>
